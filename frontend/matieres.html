<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Matières — School Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <div class="navbar-logo">🎓</div>
      <span class="navbar-title">School<span>Manager</span></span>
    </a>
    <div class="navbar-links">
      <a href="index.html" class="nav-link"><span class="nav-icon">👤</span><span class="nav-label">Professeurs</span></a>
      <a href="matieres.html" class="nav-link"><span class="nav-icon">📚</span><span class="nav-label">Matières</span></a>
      <a href="attributions.html" class="nav-link"><span class="nav-icon">🔗</span><span class="nav-label">Attributions</span></a>
      <button class="logout-btn" onclick="logout()"><span>⬡</span> Quitter</button>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <div>
        <h1 class="page-title">📚 Matières</h1>
        <p class="page-subtitle">Catalogue des enseignements de l'établissement</p>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num emerald" id="stat-total">—</div>
        <div class="stat-lbl">Total matières</div>
      </div>
      <div class="stat-card">
        <div class="stat-num accent" id="stat-credits">—</div>
        <div class="stat-lbl">Crédits totaux</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-moy" style="color:var(--amber)">—</div>
        <div class="stat-lbl">Moy. crédits</div>
      </div>
    </div>

    <div id="alert-box" class="alert" style="display:none"></div>

    <div class="neo-card" style="margin-bottom:28px">
      <div class="card-label" id="form-label">Ajouter une matière</div>
      <div class="form-grid">
        <div class="field" style="grid-column:span 2">
          <label class="field-label">Intitulé</label>
          <input type="text" id="intitule" class="field-input" placeholder="Ex : Mathématiques Avancées"/>
        </div>
        <div class="field">
          <label class="field-label">Code</label>
          <input type="text" id="code" class="field-input" placeholder="Ex : MATH101"/>
        </div>
        <div class="field">
          <label class="field-label">Crédits</label>
          <input type="number" id="credits" class="field-input" value="3" min="1" max="10"/>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-success" id="btn-submit" onclick="handleSubmit()">
          ✚ Enregistrer la matière
        </button>
        <button class="btn btn-danger" id="btn-delete" onclick="handleDelete()" disabled>
          🗑 Supprimer
        </button>
        <button class="btn btn-ghost" id="btn-deselect" onclick="deselect()" style="display:none">
          ✕ Désélectionner
        </button>
      </div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="search"
        placeholder="Rechercher par intitulé ou code..."
        oninput="filterCards()"/>
    </div>

    <div class="cards-grid stagger" id="cards-grid"></div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/matieres.js"></script>
</body>
</html>
